<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>네 개의 화면 — p5.js 작품</title>
  <meta name="description" content="정적과 동적, 추상과 자화상. p5.js로 그린 네 작품 모음." />

  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />

  <style>
    :root {
      --bg:     #f3f1ec;
      --card:   #ffffff;
      --ink:    #25221f;
      --sub:    #726c64;
      --line:   #e6e1d8;
      --accent: #c75b3e;
      --slate:  #56707d;
      --font: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont,
              system-ui, "Segoe UI", Roboto, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: clamp(2.2rem, 6vw, 4.5rem) clamp(1.1rem, 4vw, 2.5rem) 4rem;
    }

    /* header */
    header { margin-bottom: clamp(2rem, 5vw, 3.2rem); }
    h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin: 0 0 0.6rem;
    }
    header p {
      margin: 0;
      color: var(--sub);
      font-size: clamp(0.98rem, 2.2vw, 1.12rem);
    }
    .divider {
      height: 3px;
      width: 44px;
      background: var(--accent);
      border-radius: 99px;
      margin-top: 1.3rem;
    }

    /* grid */
    .gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: clamp(1.1rem, 3vw, 2rem);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: clamp(0.7rem, 1.6vw, 1rem);
      box-shadow: 0 1px 2px rgba(40,35,30,0.04);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      opacity: 0;
      transform: translateY(14px);
      animation: rise 0.6s ease-out forwards;
    }
    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.13s; }
    .card:nth-child(3) { animation-delay: 0.21s; }
    .card:nth-child(4) { animation-delay: 0.29s; }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 30px -16px rgba(40,35,30,0.28);
    }

    .art {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 2;
      overflow: hidden;
      border-radius: 10px;
      background: #111;
    }
    .art iframe {
      position: absolute;
      top: 0; left: 0;
      width: 600px;
      height: 400px;
      border: 0;
      transform-origin: top left;
    }

    .label { padding: 0.95rem 0.45rem 0.35rem; }
    .meta { display: flex; align-items: center; gap: 0.55rem; margin-bottom: 0.35rem; }
    .num { font-size: 0.85rem; font-weight: 700; color: var(--sub); }
    .badge {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.18em 0.6em;
      border-radius: 99px;
      color: #fff;
    }
    .badge.static { background: var(--slate); }
    .badge.motion { background: var(--accent); }
    .label h2 {
      font-size: 1.18rem;
      font-weight: 700;
      margin: 0 0 0.25rem;
      letter-spacing: -0.01em;
    }
    .label p { margin: 0; color: var(--sub); font-size: 0.92rem; }
    .keys {
      margin-top: 0.55rem;
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: 600;
    }
    .keys kbd {
      font-family: inherit;
      font-weight: 700;
      background: #f1ede5;
      border: 1px solid var(--line);
      border-radius: 5px;
      padding: 0.04em 0.42em;
      color: var(--ink);
      margin: 0 0.06em;
    }

    @keyframes rise { to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 720px) {
      .gallery { grid-template-columns: 1fr; }
    }
    @media (prefers-reduced-motion: reduce) {
      .card { animation: none; opacity: 1; transform: none; }
      .card:hover { transform: none; }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <header>
      <h1>네 개의 화면</h1>
      <p>정적과 동적, 추상과 자화상 — p5.js로 그린 네 작품입니다.</p>
      <div class="divider"></div>
    </header>

    <section class="gallery">

      <!-- 1행 좌: 과제 1 (정적 추상화) -->
      <article class="card">
        <div class="art"><iframe src="abstract_art/index.html" title="과제 1 정적 추상화" scrolling="no"></iframe></div>
        <div class="label">
          <div class="meta"><span class="num">과제 1</span><span class="badge static">정적</span></div>
          <h2>기하 추상화</h2>
          <p>삼각형·원·사각형의 균형과 여백으로 구성한 정적 추상화.</p>
        </div>
      </article>

      <!-- 1행 우: 과제 4 (동적 추상화) -->
      <article class="card">
        <div class="art"><iframe src="assignment2/index.html" title="과제 4 동적 추상화" scrolling="no"></iframe></div>
        <div class="label">
          <div class="meta"><span class="num">과제 4</span><span class="badge motion">동적</span></div>
          <h2>움직이는 추상화</h2>
          <p>과제 1의 구성에 색과 크기 변화를 더해 천천히 움직이게 했습니다.</p>
          <p class="keys"><kbd>G</kbd> 키로 GIF 저장</p>
        </div>
      </article>

      <!-- 2행 좌: 과제 2 (정적 자화상) -->
      <article class="card">
        <div class="art"><iframe src="caricature_portrait/index.html" title="과제 2 정적 자화상" scrolling="no"></iframe></div>
        <div class="label">
          <div class="meta"><span class="num">과제 2</span><span class="badge static">정적</span></div>
          <h2>캐리커처 자화상</h2>
          <p>도형만으로 이목구비를 단순화해 그린 자화상.</p>
        </div>
      </article>

      <!-- 2행 우: 과제 3 (동적 자화상) -->
      <article class="card">
        <div class="art"><iframe src="assignment3/index.html" title="과제 3 동적 자화상" scrolling="no"></iframe></div>
        <div class="label">
          <div class="meta"><span class="num">과제 3</span><span class="badge motion">동적</span></div>
          <h2>움직이는 자화상</h2>
          <p>마우스와 키 입력에 따라 표정과 색이 바뀌는 자화상.</p>
          <p class="keys">클릭 후 <kbd>H</kbd> 미소 <kbd>B</kbd> 깜빡 <kbd>C</kbd> 옷색 <kbd>←</kbd><kbd>→</kbd> 배경</p>
        </div>
      </article>

    </section>
  </main>

  <script>
    // 캔버스는 600×400 고정 — 카드 폭에 맞춰 iframe을 축소한다.
    const fit = (art) => {
      const f = art.querySelector('iframe');
      if (f) f.style.transform = `scale(${art.clientWidth / 600})`;
    };
    const arts = document.querySelectorAll('.art');
    if ('ResizeObserver' in window) {
      const ro = new ResizeObserver((es) => es.forEach((e) => fit(e.target)));
      arts.forEach((a) => ro.observe(a));
    } else {
      const all = () => arts.forEach(fit);
      addEventListener('resize', all); all();
    }
    requestAnimationFrame(() => arts.forEach(fit));
  </script>
</body>
</html>
