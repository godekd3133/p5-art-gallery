<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>p5.js 과제 모음 — 김민규</title>
  <meta name="description" content="p5.js 과제 1~4 작품 모음." />

  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="wrap">
    <header>
      <h1>p5.js 과제 모음</h1>
      <p>김민규</p>
      <div class="divider"></div>
    </header>

    <section class="gallery">

      <!-- 1행 좌: 과제 1 (정적 추상화) -->
      <article class="card">
        <div class="art"><iframe src="sample1/index.html" title="과제 1 정적 추상화" scrolling="no"></iframe></div>
        <div class="label">
          <div class="meta"><span class="num">과제 1</span><span class="badge static">정적</span></div>
          <h2>기하 추상화</h2>
          <p>도형으로 구성한 추상화.</p>
        </div>
      </article>

      <!-- 1행 우: 과제 4 (동적 추상화) -->
      <article class="card">
        <div class="art"><iframe src="sample4/index.html" title="과제 4 동적 추상화" scrolling="no"></iframe></div>
        <div class="label">
          <div class="meta"><span class="num">과제 4</span><span class="badge motion">동적</span></div>
          <h2>움직이는 추상화</h2>
          <p>과제 1을 색과 크기가 움직이도록 만든 버전.</p>
          <p class="keys"><kbd>G</kbd> 키로 GIF 저장</p>
        </div>
      </article>

      <!-- 2행 좌: 과제 2 (정적 자화상) -->
      <article class="card">
        <div class="art"><iframe src="sample2/index.html" title="과제 2 정적 자화상" scrolling="no"></iframe></div>
        <div class="label">
          <div class="meta"><span class="num">과제 2</span><span class="badge static">정적</span></div>
          <h2>캐리커처 자화상</h2>
          <p>도형으로 그린 캐리커처 자화상.</p>
        </div>
      </article>

      <!-- 2행 우: 과제 3 (동적 자화상) -->
      <article class="card">
        <div class="art"><iframe src="sample3/index.html" title="과제 3 동적 자화상" scrolling="no"></iframe></div>
        <div class="label">
          <div class="meta"><span class="num">과제 3</span><span class="badge motion">동적</span></div>
          <h2>움직이는 자화상</h2>
          <p>마우스와 키로 표정과 색이 바뀌는 자화상.</p>
          <p class="keys">클릭 후 <kbd>H</kbd> 미소 <kbd>B</kbd> 깜빡 <kbd>C</kbd> 옷색 <kbd>←</kbd><kbd>→</kbd> 배경</p>
        </div>
      </article>

    </section>
  </main>

  <script>
    // 캔버스는 600×400 고정 — 카드 폭에 맞춰 iframe을 축소한다.
    const fit = (art) => {
      const f = art.querySelector('iframe');
      if (f) f.style.transform = `scale(${art.clientWidth / 600})`;
    };
    const arts = document.querySelectorAll('.art');
    if ('ResizeObserver' in window) {
      const ro = new ResizeObserver((es) => es.forEach((e) => fit(e.target)));
      arts.forEach((a) => ro.observe(a));
    } else {
      const all = () => arts.forEach(fit);
      addEventListener('resize', all); all();
    }
    requestAnimationFrame(() => arts.forEach(fit));
  </script>
</body>
</html>
